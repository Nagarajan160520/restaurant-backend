<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Wake Up - Restaurant Backend</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        
        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .status {
            font-size: 1.2em;
            font-weight: bold;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .status.checking {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.online {
            background: #d4edda;
            color: #155724;
        }
        
        .status.offline {
            background: #f8d7da;
            color: #721c24;
        }
        
        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ecf0f1;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #3498db);
            transition: width 0.3s;
        }
        
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #2980b9;
        }
        
        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        
        .log {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            text-align: left;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .log-entry {
            margin: 5px 0;
            border-bottom: 1px solid #34495e;
            padding: 3px 0;
        }
        
        .features {
            margin-top: 20px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 8px;
            font-size: 12px;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ Restaurant Backend</h1>
        <p class="subtitle">Complete Management System</p>
        
        <div class="status-card">
            <div id="status" class="status checking">
                <span class="spinner"></span> Checking server status...
            </div>
            
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            
            <button id="wakeupBtn" onclick="wakeUpServer()">🌙 Wake Up Server</button>
        </div>
        
        <div id="log" class="log">
            <div class="log-entry">⏳ Initializing...</div>
        </div>
        
        <div class="features">
            <strong>✨ Features:</strong> Restaurant • Bakery • E-Commerce • Stock Management • Billing System • Real-time Notifications
        </div>
    </div>

    <script>
        const BACKEND_URL = window.location.origin;
        let progress = 0;
        let isWakingUp = false;
        
        const statusDiv = document.getElementById('status');
        const progressFill = document.getElementById('progressFill');
        const logDiv = document.getElementById('log');
        const wakeupBtn = document.getElementById('wakeupBtn');
        
        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : '⏳';
            entry.innerHTML = `[${time}] ${icon} ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        async function checkServer() {
            try {
                const response = await fetch(`${BACKEND_URL}/ping`, {
                    method: 'GET',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    statusDiv.className = 'status online';
                    statusDiv.innerHTML = '✅ Server is ONLINE and ready!';
                    addLog('Server is online!', 'success');
                    wakeupBtn.disabled = false;
                    return true;
                }
            } catch (error) {
                statusDiv.className = 'status offline';
                statusDiv.innerHTML = '❌ Server is sleeping or offline';
                addLog('Server not responding - waking up...', 'warning');
                return false;
            }
            return false;
        }
        
        async function wakeUpServer() {
            if (isWakingUp) return;
            
            isWakingUp = true;
            wakeupBtn.disabled = true;
            progress = 0;
            progressFill.style.width = '0%';
            
            statusDiv.className = 'status checking';
            statusDiv.innerHTML = '<span class="spinner"></span> Waking up server... (30-60 seconds)';
            addLog('🌙 Starting server wake-up process...');
            
            const endpoints = [
                `${BACKEND_URL}/ping`,
                `${BACKEND_URL}/api/status`,
                `${BACKEND_URL}/health`,
                `${BACKEND_URL}/api/products`,
                `${BACKEND_URL}/api/categories`
            ];
            
            for (let i = 0; i < endpoints.length; i++) {
                addLog(`📡 Trying endpoint ${i + 1}/${endpoints.length}: ${endpoints[i]}`);
                
                try {
                    const response = await fetch(endpoints[i], {
                        method: 'GET',
                        headers: { 'Cache-Control': 'no-cache' }
                    });
                    
                    if (response.ok || response.status === 404) {
                        addLog(`✅ Server responded from ${endpoints[i]}`, 'success');
                        progress = Math.min(progress + (100 / endpoints.length), 100);
                        progressFill.style.width = progress + '%';
                        
                        // Verify with ping
                        await new Promise(r => setTimeout(r, 2000));
                        const verify = await fetch(`${BACKEND_URL}/ping`);
                        if (verify.ok) {
                            statusDiv.className = 'status online';
                            statusDiv.innerHTML = '✅ Server is ONLINE and ready!';
                            addLog('🎉 Server is fully awake!', 'success');
                            wakeupBtn.disabled = false;
                            isWakingUp = false;
                            return;
                        }
                    }
                } catch (error) {
                    addLog(`⚠️ Endpoint ${i + 1} failed: ${error.message}`);
                }
                
                progress = Math.min(progress + (100 / endpoints.length / 2), 90);
                progressFill.style.width = progress + '%';
                await new Promise(r => setTimeout(r, 3000));
            }
            
            statusDiv.className = 'status offline';
            statusDiv.innerHTML = '❌ Server wake-up failed. Please try again.';
            addLog('❌ Server wake-up failed after multiple attempts', 'error');
            wakeupBtn.disabled = false;
            isWakingUp = false;
        }
        
        // Auto check on load
        checkServer();
        
        // Auto refresh every 30 seconds to keep awake
        setInterval(() => {
            fetch(`${BACKEND_URL}/ping`).catch(() => {});
        }, 25000);
    </script>
</body>
</html>
