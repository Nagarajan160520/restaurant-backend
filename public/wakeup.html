<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wake Up Server</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #2980b9; }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .status.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
            display: block;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌙 Wake Up Server</h1>
        <p>Your backend server is sleeping. Click the button below to wake it up.</p>
        <button onclick="wakeUpServer()">🚀 Wake Up Server</button>
        <div id="status" class="status"></div>
        <div style="margin-top: 20px; font-size: 12px; color: #999;">
            <p>Render free tier servers sleep after 15 minutes of inactivity.</p>
            <p>First request may take 30-60 seconds to respond.</p>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://restaurant-backend-7lyz.onrender.com';
        
        async function wakeUpServer() {
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status warning';
            statusDiv.innerHTML = '<div class="spinner"></div> Waking up server... Please wait up to 60 seconds.';
            
            let attempts = 0;
            const maxAttempts = 12; // 12 * 5 = 60 seconds
            
            while (attempts < maxAttempts) {
                attempts++;
                statusDiv.innerHTML = `<div class="spinner"></div> Attempt ${attempts}/${maxAttempts} - Waking up server...`;
                
                try {
                    const response = await fetch(`${BACKEND_URL}/ping`, {
                        method: 'GET',
                        headers: { 'Cache-Control': 'no-cache' }
                    });
                    
                    if (response.ok) {
                        statusDiv.className = 'status success';
                        statusDiv.innerHTML = '✅ Server is now awake! You can now login to the admin dashboard.';
                        return;
                    }
                } catch (error) {
                    // Server still waking up, continue
                    console.log(`Attempt ${attempts} failed`);
                }
                
                await new Promise(resolve => setTimeout(resolve, 5000));
            }
            
            statusDiv.className = 'status error';
            statusDiv.innerHTML = '❌ Server failed to wake up. Please try again in a few minutes.';
        }
    </script> 
</body>
</html>
